name: Bug report
description: Report something that doesn't work as expected.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can — missing info will slow down the fix.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect to happen? What actually happened?
      placeholder: |
        Expected: omk bench run produces a report with 3 skills.
        Actual: it crashed with "Cannot read property 'name' of undefined".
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands / config that reproduce the issue.
      placeholder: |
        1. omk bench init my-eval
        2. put <this file> in skills/
        3. omk bench run
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: If it crashed, paste the stack trace. Use `--verbose` or check `.omk/runs/*/run.log` for more detail.
      render: shell

  - type: input
    id: omk-version
    attributes:
      label: omk version
      description: Output of `omk --version`.
      placeholder: "0.18.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.10.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Context that might help — which executor (claude / openai / gemini), custom assertions, MCP setup, etc.
