name: Feature request
description: Propose a new capability or improvement.
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Explaining the problem first helps us pick the right solution together.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not the solution. What can't you do today?
      placeholder: |
        I want to compare 5 skill variants in one run, but --each only supports a single baseline vs others.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like omk to do? CLI shape, config field, report field, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve this, and why they're not ideal.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, prior art (promptfoo / DeepEval / etc.), use-case specifics.
